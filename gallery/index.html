lter:;"> <path d="M19 20.001C19 11.729 12.271 5 4 5v2c7.168 0 13 5.832 13 13.001h2z"></path> <path d="M12 20.001h2C14 14.486 9.514 10 4 10v2c4.411 0 8 3.589 8 8.001z"></path> <circle cx="6" cy="18" r="2"></circle> </svg> </a> </div> </aside> </div> </div> </body></html>  <script>(function(){const photos = [{"id":"semilleros-trasplantados","title":"Semilleros trasplantados","description":"Plántulas recién repicadas a macetas individuales, esperando turno para salir al bancal.","tags":["semillero","plántulas","trasplante"],"src":"/_astro/semilleros-trasplantados.TumdLIE1_Z2iipfK.webp","thumbSrc":"/_astro/semilleros-trasplantados.TumdLIE1_Z2fw0XO.webp","width":1600,"height":706},{"id":"rincon-terraza","title":"Rincón de la terraza","description":"Manzanilla y tomates ganando altura, apoyados en cañas y una cesta reciclada como tutor.","tags":["terraza","tomates","manzanilla"],"src":"/_astro/rincon-terraza.CzuKpWHu_Z1P8d8G.webp","thumbSrc":"/_astro/rincon-terraza.CzuKpWHu_Z1ISHkp.webp","width":1600,"height":3628},{"id":"enfermedades-fungicas","title":"Chuleta de enfermedades fúngicas","description":"Guía rápida para identificar oídio, mildiu, botrytis, roya, alternaria y chancro.","tags":["enfermedades","hongos","guía"],"src":"/_astro/enfermedades-fungicas.BCLlkNon_1EgK2b.webp","thumbSrc":"/_astro/enfermedades-fungicas.BCLlkNon_1P5CDu.webp","width":1600,"height":2133}];

  const items = Array.from(document.querySelectorAll(".gallery-item"));
  const lightbox = document.getElementById("lightbox");
  const stage = document.getElementById("lb-stage");
  const lbImg = document.getElementById("lb-img");
  const lbTitle = document.getElementById("lb-title");
  const lbDesc = document.getElementById("lb-desc");
  const lbTags = document.getElementById("lb-tags");
  const lbCounter = document.getElementById("lb-counter");
  const infoPanel = document.getElementById("lb-info");
  const btnClose = document.getElementById("lb-close");
  const btnInfo = document.getElementById("lb-info-toggle");
  const btnPrev = document.getElementById("lb-prev");
  const btnNext = document.getElementById("lb-next");

  let current = 0;
  let infoOpen = false;

  function canAnimate() {
    return (
      typeof document.startViewTransition === "function" &&
      !window.matchMedia("(prefers-reduced-motion: reduce)").matches
    );
  }

  function clearNames() {
    items.forEach((el) => (el.style.viewTransitionName = ""));
  }

  function render() {
    const p = photos[current];
    lbImg.src = p.src;
    lbImg.alt = p.title;
    lbImg.style.aspectRatio = `${p.width} / ${p.height}`;
    lbTitle.textContent = p.title;
    lbDesc.textContent = p.description;
    lbTags.innerHTML = "";
    (p.tags || []).forEach((tag) => {
      const span = document.createElement("span");
      span.className = "badge badge-outline badge-sm";
      span.textContent = `#${tag}`;
      lbTags.appendChild(span);
    });
    lbCounter.textContent = `${current + 1} / ${photos.length}`;
  }

  function withTransition(sourceIndex, mutate) {
    if (canAnimate()) {
      clearNames();
      const sourceEl = items[sourceIndex];
      if (sourceEl) sourceEl.style.viewTransitionName = "gallery-photo";
      lbImg.style.viewTransitionName = "gallery-photo";
      const transition = document.startViewTransition(mutate);
      transition.finished.finally(() => {
        clearNames();
        lbImg.style.viewTransitionName = "";
      });
    } else {
      mutate();
    }
  }

  function open(index) {
    withTransition(index, () => {
      current = index;
      render();
      lightbox.classList.remove("hidden");
      lightbox.classList.add("flex");
      document.body.style.overflow = "hidden";
    });
  }

  function close() {
    infoOpen = false;
    infoPanel.classList.remove("open");
    withTransition(current, () => {
      lightbox.classList.add("hidden");
      lightbox.classList.remove("flex");
      document.body.style.overflow = "";
    });
  }

  function go(delta) {
    const newIndex = (current + delta + photos.length) % photos.length;
    withTransition(newIndex, () => {
      current = newIndex;
      render();
    });
  }

  function toggleInfo(force) {
    infoOpen = force !== undefined ? force : !infoOpen;
    infoPanel.classList.toggle("open", infoOpen);
  }

  items.forEach((btn, i) => {
    btn.addEventListener("click", () => open(i));
  });

  btnClose.addEventListener("click", close);
  btnInfo.addEventListener("click", () => toggleInfo());
  btnPrev.addEventListener("click", () => go(-1));
  btnNext.addEventListener("click", () => go(1));

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) close();
  });

  document.addEventListener("keydown", (e) => {
    if (lightbox.classList.contains("hidden")) return;
    if (e.key === "Escape") close();
    if (e.key === "ArrowRight") go(1);
    if (e.key === "ArrowLeft") go(-1);
    if (e.key === "ArrowUp") toggleInfo(true);
    if (e.key === "ArrowDown") toggleInfo(false);
  });

  // Gestos táctiles: arriba = info, abajo = cerrar info / cerrar visor, izq-dcha = anterior/siguiente
  let touchStartX = 0;
  let touchStartY = 0;
  let touching = false;

  stage.addEventListener(
    "touchstart",
    (e) => {
      touching = true;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    },
    { passive: true },
  );

  stage.addEventListener(
    "touchend",
    (e) => {
      if (!touching) return;
      touching = false;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      const threshold = 45;
      if (absX < threshold && absY < threshold) return;

      if (absY > absX) {
        if (dy < 0) toggleInfo(true);
        else if (!infoOpen) close();
        else toggleInfo(false);
      } else {
        if (dx < 0) go(1);
        else go(-1);
      }
    },
    { passive: true },
  );
})();</script>
